services:
  - type: web
    name: unistock
    env: docker
    plan: free
    # NOTA: Las variables sensibles (DB_PASSWORD, APP_KEY, GOOGLE_*, MAIL_PASSWORD)
    # se configuran MANUALMENTE en el dashboard de Render > Environment
    # para no exponer secrets en el repositorio.
    envVars:
      - key: APP_NAME
        value: UniStock
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://srv-d6qvl994tr6s7380vvng.onrender.com

      # Database (Supabase)
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: aws-1-us-east-2.pooler.supabase.com
      - key: DB_PORT
        value: 5432
      - key: DB_DATABASE
        value: postgres

      # Session & Cache
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_DRIVER
        value: file

      # Mail config (no sensible)
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_NAME
        value: "UniStock"
